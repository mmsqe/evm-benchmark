# Tempo (commonware consensus) benchmark, local runner.
#
# Prerequisites: tempo-py's `tempo-devnet` plus `tempo` and `tempo-xtask`
# binaries (see plan.md). Unlike the cosmos profiles there is no
# `chain_config` / chains.jsonnet entry: Tempo networks are described by the
# `tempo_*` fields below and generated by `tempo-devnet init`.
#
# Preflight before trusting any number:
#   go run ./cmd/checkfunding -rpc http://127.0.0.1:8004 -chain-id 1337
temporal:
  host_port: 127.0.0.1:7233
  namespace: default
  task_queue: EVM_BENCHMARK_TASK_QUEUE

start:
  workflow_id: tempo-benchmark-sample

benchmark:
  data_dir: /tmp/tempo-benchmark/data
  out_dir: /tmp/tempo-benchmark/output

  chain_family: tempo
  runner_type: local

  # Path to the node binary (also used by tempo-devnet for the generated run.sh).
  binary: /Users/mavis/Documents/crypto/tempo/binary/bump_deps/tempo
  tempo_bin: /Users/mavis/Documents/crypto/tempo/binary/bump_deps/tempo
  tempo_xtask_bin: /Users/mavis/Documents/crypto/tempo/binary/bump_deps/tempo-xtask
  tempo_devnet_bin: /Users/mavis/Documents/crypto/tempo-py/.venv/bin/tempo-devnet

  # Ports are allocated in blocks of 6 per node; JSON-RPC sits at base+4,
  # i.e. node0 serves http://127.0.0.1:8004.
  tempo_base_port: 8000
  tempo_epoch_length: 100
  # Per-block gas budget. With Tempo's ~271k intrinsic floor this caps a block
  # at gas_limit/271k transactions, so it bounds TPS directly — set it
  # deliberately and report it alongside any result.
  tempo_gas_limit: 3000000000

  evm_chain_id: 1337
  # Must match the devnet mnemonic: the benchmark signs from
  # m/44'/60'/0'/0/{1..num_accounts}, which tempo-xtask funds from index 0.
  base_mnemonic: "test test test test test test test test test test test junk"

  # Native Tempo (0x76) transactions: generated by tempo-py's canonical encoder
  # so the envelope is never reimplemented. Comment this out to fall back to
  # legacy/London EVM transactions (Tempo's compatibility path).
  # NOTE: these are signed once with max_fee_per_gas = gas_price_wei below, so
  # give it headroom over the base fee rather than relying on regeneration.
  tempo_tx_generator: /Users/mavis/Documents/crypto/tempo-py/.venv/bin/python
  tempo_tx_generator_args:
    - scripts/gen_tempo_txs.py
  tempo_max_priority_fee_per_gas: 1000000000
  # One nonce lane per account keeps ordering comparable with legacy txs; raise
  # it only as an explicitly reported axis (see plan.md).
  tempo_nonce_key: 0
  # Workload shape (state which one a number came from):
  #   self/hot   - uncontended / one shared recipient's balance slot
  #   noop       - the execution floor
  #   batch      - N transfers per tx (report calls/s too)
  #   fresh      - transfer to a new address (state creation, ~2x gas)
  #   multitoken - spread across the four genesis tokens
  #   approve    - allowance write: the only shape on the exact-checked path
  #                that can conflict under optimistic parallel execution
  #   memo       - transferWithMemo (payment-lane variant, extra calldata)
  #   approve_transfer - approve + transferFrom in one tx (allowance consume)
  tempo_tx_shape: self
  # tempo_batch_calls: 4   # only used by tempo_tx_shape: batch

  # Tempo rejects native value transfers ("value transfer not allowed"), so the
  # workload is a TIP-20 transfer. The default target is the genesis fee token
  # 0x20c0…0000; no contract deployment is required.
  tx_type: erc20-transfer
  erc20_contract_address: "0x20c0000000000000000000000000000000000000"
  # Must exceed the per-shape gas floor or every tx is rejected up front:
  # ~272k (self/hot/noop/memo), ~320k (multitoken/approve_transfer),
  # ~550k (fresh/approve).
  erc20_transfer_gas: 300000
  # Signed as max_fee_per_gas for native txs; base fee rose to ~8 gwei under
  # load in earlier runs, so keep meaningful headroom.
  gas_price_wei: 40000000000

  # benchmark shape
  validators: 1
  fullnodes: 0
  num_accounts: 500
  num_txs: 40
  num_idle: 20
  broadcast_concurrency: 32

  # workflow behavior
  start_node: true
  skip_generate_layout: false
  pre_generate_txs: true
  run_nodes: true
  validator_generate_load: true
  patch_image:
    enabled: false
