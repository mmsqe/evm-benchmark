temporal:
  host_port: 127.0.0.1:7233
  namespace: default
  task_queue: EVM_BENCHMARK_TASK_QUEUE

start:
  workflow_id: evm-benchmark-sample

benchmark:
  data_dir: /private/tmp/data/out
  out_dir: /tmp/evm-benchmark/output

  # runtime mode
  runner_type: docker
  docker_image: "evmd-benchmark-patched:local"
  start_node: true
  docker_keep_containers: true
  docker_volumes:
    - /tmp/colima:/outputs
  docker_env:
    JOB_COMPLETION_INDEX: "0"

  # patchimage stage
  patch_image:
    enabled: false
    to_image: "evmd-benchmark-patched:local"
    source_dir: "/private/tmp/data/out"

  # chain profile
  chain_config: evmd
  chains_config_path: ../config/chains.jsonnet
  # optional: if set, account keys are derived from this phrase deterministically
  base_mnemonic: "notable error gospel wave pair ugly measure elite toddler cost various fly make eye ketchup despair slab throw tribe swarm word fruit into inmate"

  # optional deep-merge patches
  # config_patch merges into config.toml
  # app_patch merges into app.toml
  # genesis_patch merges into genesis.json
  config_patch:
    log_level: info
    mempool:
      type: "app"
  app_patch:
    evm:
      mempool:
        "operate-exclusively": true
    json-rpc:
      api: eth,net,web3,txpool
  genesis_patch: 
    consensus:
      params:
        block:
          max_gas: "163000000"

  # benchmark shape
  validators: 2
  fullnodes: 0
  num_accounts: 800
  num_txs: 20
  num_idle: 20

  # workflow behavior
  # when true, starter loads existing data_dir/nodes.json and will NOT regenerate node homes/genesis
  skip_generate_layout: true
  pre_generate_txs: true
  run_nodes: true
  validator_generate_load: true
