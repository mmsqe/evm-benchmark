# Tempo benchmark against containerised validators.
#
# The devnet (genesis, keys, per-node dirs and a docker-compose.yaml) is
# generated in-process, and the whole cluster is started with
# `docker compose up -d`; unlike the cosmos docker runner there is no per-node
# `docker run`. Consequently:
#
#   * start_node MUST be false - compose owns the container lifecycle;
#   * tempo_bin is the in-image command name, not a host path;
#   * tempo_xtask_bin still runs on the HOST (it builds genesis and keys).
#
# NOTE: this measures the tempo build inside the image, not a local binary.
# Check it with:
#   docker run --rm --entrypoint sh <image> -c "tempo --version"
temporal:
  host_port: 127.0.0.1:7233
  namespace: default
  task_queue: EVM_BENCHMARK_TASK_QUEUE

start:
  workflow_id: tempo-docker-benchmark

benchmark:
  data_dir: /tmp/tempo-benchmark-docker/data
  out_dir: /tmp/tempo-benchmark-docker/output

  chain_family: tempo
  runner_type: docker
  # Compose owns the nodes; RunNode only waits for the published RPC.
  start_node: false

  tempo_docker_image: ghcr.io/tempoxyz/tempo:latest
  tempo_docker_network: tempo-devnet
  # Fixed so `scripts/run-benchmark.sh --mode tempo-docker stop` can find it.
  tempo_compose_project: evm-benchmark-tempo
  # In-image command name (the node runs inside the container).
  tempo_bin: tempo
  # Host binary: genesis/key generation runs outside docker (tx signing is
  # in-process). tempo-xtask is the only host binary the docker profile needs.
  tempo_xtask_bin: /Users/mavis/Documents/crypto/tempo/binary/bump_deps/tempo-xtask

  # Compose publishes each node's JSON-RPC on base_port+4, matching the local
  # runner, so node0 is reachable at http://127.0.0.1:8004.
  tempo_base_port: 8000
  tempo_epoch_length: 100
  tempo_gas_limit: 3000000000

  evm_chain_id: 1337
  base_mnemonic: "test test test test test test test test test test test junk"

  # Native 0x76 transactions, signed in-process (the default).
  tempo_max_priority_fee_per_gas: 1000000000
  tempo_nonce_key: 0

  tx_type: erc20-transfer
  erc20_contract_address: "0x20c0000000000000000000000000000000000000"
  erc20_transfer_gas: 300000
  gas_price_wei: 40000000000

  # benchmark shape
  # >=2 required: the docker launcher builds each container's trusted-peers from the
  # OTHER validators, so a single-node docker devnet gets an empty list.
  # 4 also makes this the first multi-validator measurement (real consensus).
  validators: 4
  fullnodes: 0
  # Per node. Each node takes a disjoint slice of the funded account branch,
  # so genesis funds validators * num_accounts + 1 accounts (index 0 is the
  # validator key).
  num_accounts: 500
  num_txs: 100
  num_idle: 20
  broadcast_concurrency: 32

  # workflow behavior
  skip_generate_layout: false
  pre_generate_txs: true
  run_nodes: true
  validator_generate_load: true
  patch_image:
    enabled: false
